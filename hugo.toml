baseURL = "https://aigas.top/"
locale = "en-US"
title = "AI Gas"

paginate = 10
enableRobotsTXT = false
hasCJKLanguage = false
disableKinds = ["taxonomy", "term"]

[params]
  description = "AI Gas publishes practical AI tool reviews, workflow guides, and comparison notes for people choosing software for real work."
  author = "AI Gas Editorial Team"
  keywords = ["AI tools", "AI reviews", "AI tutorials", "ChatGPT", "Claude", "Midjourney", "AI guides"]
  enableAds = false
  enableAffiliate = false

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 4

[outputs]
  home = ["HTML", "RSS"]

[social]
  twitter = "aigastop"
  github = "aigastop"
  linkedin = "aigas"

[imaging]
  quality = 75
  anchor = "smart"
  resize = "smart"
  
[params.verification]
  google = ""
  bing = ""
  yandex = ""
  
[params.schema]
  enable = true
  type = "WebSite"
  name = "AI Gas"
  description = "Practical AI tool reviews, tutorials, and comparison notes"
  url = "https://aigas.top"
  sameAs = ["https://twitter.com/aigastop"]
  
[params.privacy]
  gdpr = true
  ccpa = true
  cookieConsent = true
  
[params.legal]
  affiliateDisclosure = false
  privacyPolicy = "/privacy/"
  termsOfService = "/terms/"
  contactPage = "/contact/"
