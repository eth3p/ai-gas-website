<!-- Advertisement Placements -->
{{ if .Site.Params.enableAds }}
  <!-- Header Ad -->
  <div class="ad-container">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="{{ .Site.Params.adsenseClient }}"
         data-ad-slot="{{ .Site.Params.adSlotHeader }}"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- Sticky Sidebar Ad (Desktop Only) -->
  <div class="sticky-ad">
    <ins class="adsbygoogle"
         style="display:inline-block;width:300px;height:600px"
         data-ad-client="{{ .Site.Params.adsenseClient }}"
         data-ad-slot="{{ .Site.Params.adSlotSidebar }}"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <!-- In-content Ad -->
  <div class="ad-container">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="{{ .Site.Params.adsenseClient }}"
         data-ad-slot="{{ .Site.Params.adSlotInline }}"
         data-ad-format="fluid"
         data-ad-layout-key="-fb+5w+4e-db+86"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>
{{ end }}
