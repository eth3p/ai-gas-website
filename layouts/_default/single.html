{{ define "main" }}
  <article class="post">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
    <div class="post-meta">
      {{ .Date.Format "January 2, 2006" }} · {{ .ReadingTime }} min read
    </div>
    {{ end }}
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
