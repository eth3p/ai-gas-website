{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ with .Content }}
  <div class="post-content">{{ . }}</div>
  {{ end }}
  <div class="post-list">
    {{ range .Pages }}
      <article class="post-card">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ if not .Date.IsZero }}
        <div class="post-meta">{{ .Date.Format "January 2, 2006" }} · {{ .ReadingTime }} min read</div>
        {{ end }}
        <p>{{ .Summary | plainify | truncate 180 }}</p>
        <a href="{{ .RelPermalink }}">Read more</a>
      </article>
    {{ end }}
  </div>
{{ end }}
